name: Zesh CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }} / -std=${{ matrix.std }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu x86_64
          - os: ubuntu-latest
            compiler: gcc
            std: c11
          - os: ubuntu-latest
            compiler: gcc
            std: c17
          - os: ubuntu-latest
            compiler: gcc
            std: c23
            std_flag: c2x
          - os: ubuntu-latest
            compiler: clang
            std: c11
          - os: ubuntu-latest
            compiler: clang
            std: c17
          - os: ubuntu-latest
            compiler: clang
            std: c23
          # Ubuntu ARM64
          - os: ubuntu-24.04-arm
            compiler: gcc
            std: c11
          - os: ubuntu-24.04-arm
            compiler: gcc
            std: c17
          - os: ubuntu-24.04-arm
            compiler: clang
            std: c11
          - os: ubuntu-24.04-arm
            compiler: clang
            std: c17
          # macOS ARM (M1/M2/M3)
          - os: macos-latest
            compiler: clang
            std: c11
          - os: macos-latest
            compiler: clang
            std: c17
          - os: macos-latest
            compiler: clang
            std: c23

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get install -y libsqlite3-dev

      - name: Install dependencies (macOS)
        if: startsWith(matrix.os, 'macos')
        run: brew install sqlite3

      - name: Set std flag
        id: stdflags
        run: |
          STD="${{ matrix.std_flag || matrix.std }}"
          echo "std_flag=$STD" >> $GITHUB_OUTPUT

      - name: Build release
        run: |
          ${{ matrix.compiler }} -Wall -std=${{ steps.stdflags.outputs.std_flag }} \
            -D_POSIX_C_SOURCE=200809L \
            -Iinclude src/*.c -o zesh \
            $(pkg-config --libs sqlite3 2>/dev/null || echo "-lsqlite3") \
            $([ "$(uname)" != "Darwin" ] && echo "-ldl" || echo "")

      - name: Build debug
        run: |
          ${{ matrix.compiler }} -Wall -std=${{ steps.stdflags.outputs.std_flag }} \
            -D_GNU_SOURCE -D_POSIX_C_SOURCE=200809L \
            -g -fsanitize=address,undefined \
            -Iinclude src/*.c -o zesh_debug \
            $(pkg-config --libs sqlite3 2>/dev/null || echo "-lsqlite3") \
            $([ "$(uname)" != "Darwin" ] && echo "-ldl" || echo "")

      - name: Run parity tests
        run: |
          ./zesh test_parite.sh > /tmp/test_out.txt 2>/tmp/test_err.txt || true
          cat /tmp/test_out.txt
          cat /tmp/test_err.txt | head -20
          grep "RESULT" /tmp/test_out.txt || echo "NO RESULT LINE"
          if grep -q "0 FAIL" /tmp/test_out.txt; then
            echo "All parity tests passed"
          else
            echo "PARITY TESTS FAILED"
            exit 1
          fi

      - name: Run ASAN tests
        run: |
          ./zesh_debug test_parite.sh \
            > /tmp/asan_out.txt 2>/tmp/asan_err.txt || true
          if ! grep -q "0 FAIL" /tmp/asan_out.txt; then
            echo "ASAN tests FAILED"
            cat /tmp/asan_out.txt
            exit 1
          fi
          if grep -q "ERROR: AddressSanitizer\|runtime error:" /tmp/asan_err.txt; then
            echo "ASAN/UBSAN errors:"
            cat /tmp/asan_err.txt
            exit 1
          fi

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.std }}
          path: |
            /tmp/test_out.txt
            /tmp/test_err.txt
            /tmp/asan_out.txt
            /tmp/asan_err.txt